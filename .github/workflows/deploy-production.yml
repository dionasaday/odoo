name: Deploy Odoo 19 Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/commit)"
        required: false
        default: "main"
      modules:
        description: "Comma-separated modules to upgrade (optional)"
        required: false
        default: ""
      dry_run:
        description: "Dry run only (true/false)"
        required: false
        default: "false"
      repo_dir:
        description: "Deploy repository directory on server (optional)"
        required: false
        default: ""

concurrency:
  group: odoo-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve Inputs
        id: vars
        shell: bash
        env:
          SECRET_PROD_HOST: ${{ secrets.PROD_HOST }}
          SECRET_PROD_USER: ${{ secrets.PROD_USER }}
          SECRET_PROD_PORT: ${{ secrets.PROD_PORT }}
          VAR_PROD_HOST: ${{ vars.PROD_HOST }}
          VAR_PROD_USER: ${{ vars.PROD_USER }}
          VAR_PROD_PORT: ${{ vars.PROD_PORT }}
        run: |
          set -euo pipefail
          REF_INPUT="${{ github.event.inputs.ref }}"
          MODULES_INPUT="${{ github.event.inputs.modules }}"
          DRY_RUN_INPUT="${{ github.event.inputs.dry_run }}"
          REPO_INPUT="${{ github.event.inputs.repo_dir }}"
          REPO_VAR="${{ vars.DEPLOY_REPO_DIR }}"

          if [[ -z "${REF_INPUT}" ]]; then
            REF_INPUT="main"
          fi
          if [[ -z "${DRY_RUN_INPUT}" ]]; then
            DRY_RUN_INPUT="false"
          fi
          if [[ -n "${REPO_INPUT}" ]]; then
            FINAL_REPO="${REPO_INPUT}"
          elif [[ -n "${REPO_VAR}" ]]; then
            FINAL_REPO="${REPO_VAR}"
          else
            FINAL_REPO="/opt/odoo/custom_addons_deploy_clean"
          fi

          SSH_HOST="${SECRET_PROD_HOST:-}"
          SSH_USER="${SECRET_PROD_USER:-}"
          SSH_PORT="${SECRET_PROD_PORT:-}"

          if [[ -z "$SSH_HOST" ]]; then SSH_HOST="${VAR_PROD_HOST:-}"; fi
          if [[ -z "$SSH_USER" ]]; then SSH_USER="${VAR_PROD_USER:-}"; fi
          if [[ -z "$SSH_PORT" ]]; then SSH_PORT="${VAR_PROD_PORT:-22}"; fi

          if [[ -z "$SSH_HOST" ]]; then
            echo "::error::Missing PROD_HOST. Add it in Environment secret (production) or Repository variable/secret."
            exit 1
          fi
          if [[ -z "$SSH_USER" ]]; then
            echo "::error::Missing PROD_USER. Add it in Environment secret (production) or Repository variable/secret."
            exit 1
          fi

          echo "ref=${REF_INPUT}" >> "$GITHUB_OUTPUT"
          echo "modules=${MODULES_INPUT}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN_INPUT}" >> "$GITHUB_OUTPUT"
          echo "repo_dir=${FINAL_REPO}" >> "$GITHUB_OUTPUT"
          echo "ssh_host=${SSH_HOST}" >> "$GITHUB_OUTPUT"
          echo "ssh_user=${SSH_USER}" >> "$GITHUB_OUTPUT"
          echo "ssh_port=${SSH_PORT}" >> "$GITHUB_OUTPUT"

      - name: Verify SSH key exists
        shell: bash
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${PROD_SSH_KEY}" ]]; then
            echo "::error::Missing PROD_SSH_KEY secret. Set it in Environment secrets (production) or Repository secrets."
            exit 1
          fi

      - name: Deploy On Server Over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.vars.outputs.ssh_host }}
          username: ${{ steps.vars.outputs.ssh_user }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ steps.vars.outputs.ssh_port }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail
            DEPLOY_REPO="${{ steps.vars.outputs.repo_dir }}"

            if ! git -C "$DEPLOY_REPO" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo "Deploy repo not found or invalid git worktree: $DEPLOY_REPO"
              echo "Create it first or set repo_dir input/DEPLOY_REPO_DIR variable correctly."
              exit 1
            fi

            cd "$DEPLOY_REPO"
            chmod +x scripts/deploy/*.sh
            scripts/deploy/deploy_odoo19.sh \
              --repo "$DEPLOY_REPO" \
              --ref "${{ steps.vars.outputs.ref }}" \
              --modules "${{ steps.vars.outputs.modules }}" \
              --dry-run "${{ steps.vars.outputs.dry_run }}"
